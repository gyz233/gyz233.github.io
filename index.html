<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的个人主页</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f8;
      color: #222;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 48px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 42px;
      margin-bottom: 12px;
    }

    h2 {
      margin-top: 40px;
      font-size: 24px;
    }

    p {
      font-size: 18px;
    }

    a {
      color: #0969da;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .tag {
      background: #eef2ff;
      color: #3730a3;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
    }

    footer {
      margin-top: 40px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>你好，我是你的名字</h1>
      <p>
        这里是我的个人主页。我关注计算机、人工智能、产品设计和有趣的项目。
      </p>

      <h2>关于我</h2>
      <p>
        你可以在这里介绍自己的学校、专业、研究方向、技能、经历或兴趣。
      </p>

      <h2>项目</h2>
      <p>
        这里可以放你的 GitHub 项目、论文、作品集、博客文章或简历链接。
      </p>

      <div class="tags">
        <span class="tag">Python</span>
        <span class="tag">AI</span>
        <span class="tag">Web</span>
        <span class="tag">GitHub Pages</span>
      </div>

      <h2>联系我</h2>
      <p>
        Email: your-email@example.com<br />
        GitHub: <a href="https://github.com/你的GitHub用户名">你的GitHub用户名</a>
      </p>

      <footer>
        © 2026 你的名字
      </footer>
    </section>
  </main>
</body>
</html>
